apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: homie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler-service
  template:
    metadata:
      labels:
        app: scheduler-service
    spec:
      containers:
        - name: scheduler-service
          image: scheduler-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TASK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: scheduler-service-config
                  key: TASK_SERVICE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: scheduler-service-config
                  key: REDIS_URL
            - name: CRON_SCHEDULE
              valueFrom:
                configMapKeyRef:
                  name: scheduler-service-config
                  key: CRON_SCHEDULE
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "200m"
