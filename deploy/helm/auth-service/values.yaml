replicaCount: 1

image:
  repository: auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8081
  nodePort: 30081

env:
  HTTP_PORT: "8081"
  JWT_EXPIRY: "24h"

secret:
  databaseUrl: ""
  jwtSecret: ""

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
