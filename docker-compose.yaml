services:
  postgres:
    image: postgres:16-alpine
    container_name: domely-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: domely-redis

  task-service:
    image: task-service:latest
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    container_name: task-service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      HTTP_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  scheduler-service:
    build:
      context: .
      dockerfile: services/scheduler-service/Dockerfile
    container_name: scheduler-service
    environment:
      TASK_SERVICE_URL: http://task-service:8080
      REDIS_URL: redis://redis:6379
    depends_on:
      - task-service
      - redis

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      HTTP_PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h
    depends_on:
      postgres:
        condition: service_healthy
      task-service:
        condition: service_healthy
  
  frontend-service:
    image: frontend-service:latest
    build:
      context: .
      dockerfile: services/frontend-service/Dockerfile
    container_name: frontend-service
    ports:
     - "3001:80"

volumes:
  pgdata: